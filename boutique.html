<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2ecc71">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GKK_store - Boutique</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#f5f7fa;color:#333}

/* HEADER */
header{
position:fixed;top:0;left:0;width:100%;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.08);
z-index:1000;
}
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:0 5%;
height:75px;
}
.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
color:#2ecc71;
cursor:pointer;
}
.nav a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:600;
}

/* BANNER */
.banner{
margin-top:75px;
padding:40px;
text-align:center;
background:linear-gradient(135deg,#2ecc71,#27ae60);
color:white;
}

/* SEARCH */
.search{
display:flex;
justify-content:center;
margin:20px;
}
.search input{
width:100%;
max-width:600px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
cursor:pointer;
}

.card-body{padding:10px}
.price{color:#2ecc71;font-weight:bold;margin:8px 0}

.btn{
width:100%;
padding:10px;
border:none;
background:#2ecc71;
color:#fff;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
background:#2ecc71;
color:#fff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
.count{
position:absolute;
top:-5px;
right:-5px;
background:red;
width:22px;
height:22px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
}

/* PANIER */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}
.box{
background:#fff;
padding:20px;
width:90%;
max-width:450px;
border-radius:10px;
}
.order{
margin-top:15px;
width:100%;
padding:12px;
border:none;
background:#25D366;
color:#fff;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

/* LIGHTBOX IMAGE */
.lightbox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:3000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* bouton fermer image */
.close-btn{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
cursor:pointer;
font-weight:bold;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:2000;
}
.admin-box{
background:#fff;
padding:20px;
width:90%;
max-width:500px;
border-radius:10px;
}
.admin-box input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:6px;
}
.admin-btn{
background:#2ecc71;
color:#fff;
padding:10px;
border:none;
width:100%;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}
.close{background:red}
</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo" onclick="openAdmin()">
<i class="fa fa-store"></i> GKK_store
</div>

<div class="nav">
<a href="#">Accueil</a>
<a href="#">Boutique</a>
<a href="#">Contact</a>
</div>
</div>
</header>

<div class="banner">
<h1>Boutique GKK_store</h1>
<p>Habits • Chaussures • Téléphones • Luxe</p>
</div>

<div class="search">
<input id="search" onkeyup="filter()" placeholder="Rechercher un produit...">
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" onclick="openCart()">
<i class="fa fa-shopping-cart"></i>
<div class="count" id="count">0</div>
</div>

<!-- PANIER -->
<div class="modal" id="modal">
<div class="box">
<h2>Votre Panier</h2>
<div id="list"></div>
<div id="total"></div>
<button class="order" onclick="order()">Commander</button>
</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg(event)">

<span class="close-btn" onclick="closeImg(event)">✖</span>

<img id="bigImg" onclick="event.stopPropagation()">

</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<div class="admin-box">

<h2>Admin GKK</h2>

<div id="login">
<input type="password" id="key" placeholder="Clé secrète">
<button class="admin-btn" onclick="checkKey()">Entrer</button>
</div>

<div id="panel" style="display:none">

<input id="pname" placeholder="Nom produit">
<input id="pcat" placeholder="Catégorie">
<input id="pprice" placeholder="Prix">
<input type="file" id="pimg" accept="image/*">

<button class="admin-btn" onclick="addProduct()">Ajouter produit</button>
<button class="admin-btn close" onclick="closeAdmin()">Fermer</button>

</div>

</div>
</div>

<script>

let cart=[];
let total=0;

/* 🔥 STOCKAGE */
let products = JSON.parse(localStorage.getItem("gkk_products")) || [];

function save(){
localStorage.setItem("gkk_products", JSON.stringify(products));
}

/* AFFICHAGE PRODUITS */
function render(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.i}" onclick="openImg('${p.i}')">
<div class="card-body">
<h3>${p.n}</h3>
<div class="price">${p.p}$</div>
<button class="btn" onclick="add('${p.n}',${p.p})">Acheter</button>
</div>
</div>`;
});
}
render();

/* LIGHTBOX IMAGE */
function openImg(src){
document.getElementById("bigImg").src=src;
document.getElementById("lightbox").style.display="flex";
}

function closeImg(e){
document.getElementById("lightbox").style.display="none";
}

/* CART */
function add(n,p){
cart.push({n,p});
total+=p;
document.getElementById("count").innerText=cart.length;
}

function openCart(){
let html="";
cart.forEach(i=>html+=`<p>${i.n} - ${i.p}$</p>`);
document.getElementById("list").innerHTML=html;
document.getElementById("total").innerText="Total: "+total+"$";
document.getElementById("modal").style.display="flex";
}

function order(){
let msg="🛒 COMMANDE GKK_STORE%0A";
cart.forEach(i=>msg+=i.n+" - "+i.p+"$%0A");
msg+="%0ATotal: "+total+"$";
window.open("https://wa.me/243978713440?text="+msg,"_blank");
}

/* SEARCH */
function filter(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* ADMIN */
function openAdmin(){
document.getElementById("admin").style.display="flex";
}

function checkKey(){
if(document.getElementById("key").value==="gkk_2026@"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}else{
alert("Clé incorrecte !");
}
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

/* AJOUT PRODUIT */
function addProduct(){

let n=document.getElementById("pname").value;
let c=document.getElementById("pcat").value;
let p=parseFloat(document.getElementById("pprice").value);
let file=document.getElementById("pimg").files[0];

if(!file){alert("Ajoute une image");return;}

let reader=new FileReader();

reader.onload=function(){

products.push({
n:n,
c:c,
p:p,
i:reader.result
});

save();
render();
closeAdmin();

/* reset */
document.getElementById("pname").value="";
document.getElementById("pcat").value="";
document.getElementById("pprice").value="";
document.getElementById("pimg").value="";
};

reader.readAsDataURL(file);
}
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
